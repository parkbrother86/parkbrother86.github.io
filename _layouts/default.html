<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title %}
        {{ page.title }} | {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="site-title" href="{{ '/' | relative_url }}">
          <span class="bilingual inline">
            <span class="en">Park Brother Blog</span>
            <span class="ko">박형제 블로그</span>
          </span>
        </a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">
            <span class="bilingual inline nav-label">
              <span class="en">Home</span>
              <span class="ko">홈</span>
            </span>
          </a>
          <a href="{{ '/about/' | relative_url }}">
            <span class="bilingual inline nav-label">
              <span class="en">About</span>
              <span class="ko">소개</span>
            </span>
          </a>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p class="bilingual">
          <span class="en">Notes, posts, and updates from Park Brother.</span>
          <span class="ko">박형제의 글과 기록을 담는 공간입니다.</span>
        </p>
      </footer>
    </div>
  </body>
</html>
