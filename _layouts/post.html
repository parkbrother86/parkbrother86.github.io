---
layout: default
---

<article class="panel post-body">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">
    <span class="bilingual inline">
      <span class="en">Published on {{ page.date | date: "%Y-%m-%d" }}</span>
      <span class="ko">{{ page.date | date: "%Y-%m-%d" }} 게시</span>
    </span>
  </p>
  {{ content }}
</article>
